services:
  be-core:
    image: ${CORE_IMAGE:-ghcr.io/fega-kt/backend-mikroorm-core:latest}
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      CORE_PORT: 3030

  be-app:
    image: ${APP_IMAGE:-ghcr.io/fega-kt/backend-mikroorm-app:latest}
    restart: unless-stopped
    ports:
      - "3031:3031"
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      APP_PORT: 3031

  be-core-jobs:
    image: ${CORE_JOBS_IMAGE:-ghcr.io/fega-kt/backend-mikroorm-core-jobs:latest}
    restart: unless-stopped
    ports:
      - "3032:3032"
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      CORE_JOB_PORT: 3032

  be-app-jobs:
    image: ${APP_JOBS_IMAGE:-ghcr.io/fega-kt/backend-mikroorm-app-jobs:latest}
    restart: unless-stopped
    ports:
      - "3033:3033"
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      APP_JOB_PORT: 3033
