name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: core
            app_path: apps/core
          - app: app
            app_path: apps/app
          - app: core-jobs
            app_path: jobs/core-jobs
          - app: app-jobs
            app_path: jobs/app-jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.app }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            APP=${{ matrix.app }}
            APP_PATH=${{ matrix.app_path }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.SERVER_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Deploy
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CORE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-core:latest
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-app:latest
          CORE_JOBS_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-core-jobs:latest
          APP_JOBS_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-app-jobs:latest
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash <<ENDSSH
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}" \
              CORE_IMAGE="$CORE_IMAGE" \
              APP_IMAGE="$APP_IMAGE" \
              CORE_JOBS_IMAGE="$CORE_JOBS_IMAGE" \
              APP_JOBS_IMAGE="$APP_JOBS_IMAGE" \
              bash up.sh
            docker image prune -f
          ENDSSH
