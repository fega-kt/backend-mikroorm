name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build-and-push:
    name: Build & Push (${{ matrix.app }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: core
            app_path: apps/core
          - app: app
            app_path: apps/app
          - app: core-jobs
            app_path: jobs/core-jobs
          - app: app-jobs
            app_path: jobs/app-jobs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Attach branch name
        id: branch
        run: echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Get build time
        id: build_time
        run: echo "value=${{ github.event.head_commit.timestamp }}" >> "$GITHUB_OUTPUT"

      - name: Login Docker registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.app }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            APP=${{ matrix.app }}
            APP_PATH=${{ matrix.app_path }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ steps.branch.outputs.name }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.app }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.app }}:sha-${{ github.sha }}

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.SERVER_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Deploy
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CORE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-core:latest
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-app:latest
          CORE_JOBS_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-core-jobs:latest
          APP_JOBS_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-app-jobs:latest
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash <<ENDSSH
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}" \
              CORE_IMAGE="$CORE_IMAGE" \
              APP_IMAGE="$APP_IMAGE" \
              CORE_JOBS_IMAGE="$CORE_JOBS_IMAGE" \
              APP_JOBS_IMAGE="$APP_JOBS_IMAGE" \
              bash up.sh
            docker image prune -f
          ENDSSH
